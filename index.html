<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replica de Google</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="top-bar">
        <nav class="left-nav">
            <a href="#">Sobre Google</a>
            <a href="#">Tienda</a>
        </nav>
        <nav class="right-nav">
            <a href="#">Gmail</a>
            <a href="#">Imágenes</a>

            <button class="app-grid" aria-label="Apps de Google">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </button>

            <div class="user-area">
                <button>Iniciar sesión</button>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="logo-text">
            <span class="letter-g">G</span><span class="letter-o1">o</span><span class="letter-o2">o</span><span class="letter-g2">g</span><span class="letter-l">l</span><span class="letter-e">e</span>
        </h1>

        <form class="search-form" action="#">
    <div class="search-wrapper">
        <input type="text" class="search-input" placeholder="Buscar en Google">
        <button type="button" class="search-left-icon">+</button>
        <div class="search-right-icons">
            <button>🎤</button>
            <button>📷</button>
            <button class="mode-ia-button">
                <span class="mode-ia-icon">🔍</span>
                <span class="mode-ia-text">Modo IA</span>
            </button>
        </div>
    </div>

    <div class="buttons">
        <button type="submit" class="search-button">Buscar con Google</button>
        <button type="button" class="lucky-button">Voy a tener suerte</button>
    </div>

    <div class="language-offer">
        Ofrecido por Google en: 
        <a href="#">català</a> 
        <a href="#">galego</a> 
        <a href="#">euskara</a>
    </div>
</form>
    </main>

    <footer class="footer">
        <div class="footer-top">España</div>
        <div class="footer-divider"></div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">Publicidad</a>
                <a href="#">Empresa</a>
                <a href="#">Cómo funciona la Búsqueda</a>
            </div>
            <div class="footer-center">
                <a href="#">Tres décadas de acción climática: descubre lo que estamos haciendo</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacidad</a>
                <a href="#">Términos</a>
                <a href="#">Configuración</a>
            </div>
        </div>
    </footer>

</body>

</html>
